{% extends "layout.html" %}
{% block content %}
    <h2>Add a New Post</h2>
    <form method="POST">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title">
        
        <label for="content">Content:</label>
        <textarea id="content" name="content"></textarea>
        
        <button type="submit">Submit</button>
    </form>
{% endblock %}
